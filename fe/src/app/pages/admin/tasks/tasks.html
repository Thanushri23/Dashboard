<div class="card p-4 shadow-sm border-0 rounded-4">
  <h5 class="fw-bold mb-4 text-primary"><i class="bi bi-list-task me-2"></i>Assign New Task</h5>
  
  <div class="row g-3 mb-4 p-3 bg-light rounded-4 border">
    <div class="col-md-3">
      <label class="form-label small fw-bold text-muted mb-1">Employee</label>
      <select class="form-select border-0 shadow-sm" [(ngModel)]="newTask.userId">
        <option value="" disabled selected>Select Employee</option>
        <option *ngFor="let user of users" [value]="user._id">{{user.name}}</option>
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label small fw-bold text-muted mb-1">Task Title</label>
      <input type="text" class="form-control border-0 shadow-sm" placeholder="e.g. Update DB" [(ngModel)]="newTask.title">
    </div>
    <div class="col-md-4">
      <label class="form-label small fw-bold text-muted mb-1">Description</label>
      <input type="text" class="form-control border-0 shadow-sm" placeholder="Task details" [(ngModel)]="newTask.description">
    </div>
    <div class="col-md-2 d-flex align-items-end">
      <button class="btn btn-primary w-100 fw-semibold shadow-sm" (click)="addTask()">Assign Task</button>
    </div>
  </div>

  <h5 class="fw-bold mb-3 mt-4">All Tasks</h5>
  <div *ngIf="tasks.length === 0" class="text-center text-muted py-5 bg-light rounded-3 border border-dashed">
    <i class="bi bi-folder-x fs-1"></i>
    <p class="mt-2 mb-0">No tasks found.</p>
  </div>
  
  <div class="d-flex flex-column gap-3">
    <div *ngFor="let task of tasks" class="border p-3 rounded-3 shadow-sm bg-white d-flex flex-wrap justify-content-between align-items-center" style="border-left: 4px solid #6f42c1 !important;">
      
      <div class="flex-grow-1" *ngIf="editingTaskId !== task._id">
        <div class="d-flex align-items-center gap-2 mb-1">
          <h6 class="mb-0 fw-bold text-dark">{{task.title}}</h6>
          <span class="badge bg-secondary rounded-pill" *ngIf="task.userId?.name"><i class="bi bi-person me-1"></i>{{task.userId?.name}}</span>
        </div>
        <p class="mb-0 text-muted small">{{task.description}}</p>
      </div>

      <div class="flex-grow-1 d-flex flex-wrap gap-2 me-3" *ngIf="editingTaskId === task._id">
        <input type="text" class="form-control form-control-sm w-auto flex-grow-1" [(ngModel)]="editTaskData.title">
        <input type="text" class="form-control form-control-sm w-auto flex-grow-1" [(ngModel)]="editTaskData.description">
      </div>

      <div class="d-flex gap-2 mt-2 mt-sm-0">
        <ng-container *ngIf="editingTaskId !== task._id">
          <button class="btn btn-sm btn-outline-secondary" (click)="startEdit(task)">Edit</button>
          <button class="btn btn-sm btn-outline-danger" (click)="deleteTask(task._id)">Delete</button>
        </ng-container>
        <ng-container *ngIf="editingTaskId === task._id">
          <button class="btn btn-sm btn-success" (click)="saveEdit(task._id)">Save</button>
          <button class="btn btn-sm btn-light" (click)="cancelEdit()">Cancel</button>
        </ng-container>
      </div>

    </div>
  </div>
</div>
