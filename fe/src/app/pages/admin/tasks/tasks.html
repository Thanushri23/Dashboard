<div class="p-1">
  <!-- Page header -->
  <div class="page-header">
    <div class="page-header-icon"><i class="bi bi-list-task"></i></div>
    <div>
      <h2 class="page-title">Task Management</h2>
      <p class="page-subtitle">Assign and manage employee tasks</p>
    </div>
  </div>

  <!-- Assign task form -->
  <div class="form-panel">
    <div class="form-panel-title"><i class="bi bi-plus-circle"></i> Assign New Task</div>
    <div class="row g-3 align-items-end">
      <div class="col-md-3">
        <label class="info-label mb-1">Employee</label>
        <select class="form-select" [(ngModel)]="newTask.userId">
          <option value="" disabled selected>Select Employee</option>
          <option *ngFor="let user of users" [value]="user._id">{{user.name}}</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="info-label mb-1">Task Title</label>
        <input type="text" class="form-control" placeholder="e.g. Update Database" [(ngModel)]="newTask.title">
      </div>
      <div class="col-md-4">
        <label class="info-label mb-1">Description</label>
        <input type="text" class="form-control" placeholder="Brief task description" [(ngModel)]="newTask.description">
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100 fw-semibold" (click)="addTask()" [disabled]="isSubmitting">
          <i class="bi bi-send me-1" *ngIf="!isSubmitting"></i>
          <span class="spinner-border spinner-border-sm me-1" *ngIf="isSubmitting" role="status" aria-hidden="true"></span>
          {{ isSubmitting ? 'Assigning...' : 'Assign' }}
        </button>
      </div>
    </div>
  </div>

  <!-- Tasks list -->
  <div class="section-heading"><i class="bi bi-clipboard-check me-2"></i>All Assigned Tasks</div>

  <div *ngIf="tasks.length === 0" class="empty-state">
    <i class="bi bi-folder-x"></i>
    <p class="mb-0 fw-semibold">No tasks assigned yet</p>
    <p class="small mt-1">Use the form above to create the first task</p>
  </div>

  <div class="d-flex flex-column gap-3">
    <div *ngFor="let task of tasks" class="item-card">

      <!-- View mode -->
      <div class="flex-grow-1" *ngIf="editingTaskId !== task._id">
        <div class="d-flex align-items-center gap-2 mb-1">
          <p class="item-title">{{task.title}}</p>
          <span class="badge rounded-pill px-2 py-1" style="background:#dbeafe; color:#1d4ed8; font-size:0.75rem;" *ngIf="task.userId?.name">
            <i class="bi bi-person me-1"></i>{{task.userId?.name}}
          </span>
        </div>
        <p class="item-desc">{{task.description}}</p>
      </div>

      <!-- Edit mode -->
      <div class="flex-grow-1 d-flex flex-wrap gap-2 me-3" *ngIf="editingTaskId === task._id">
        <input type="text" class="form-control form-control-sm" style="min-width:160px; flex:1;" [(ngModel)]="editTaskData.title" placeholder="Task title">
        <input type="text" class="form-control form-control-sm" style="min-width:200px; flex:2;" [(ngModel)]="editTaskData.description" placeholder="Description">
      </div>

      <!-- Action buttons -->
      <div class="d-flex gap-2 flex-shrink-0">
        <ng-container *ngIf="editingTaskId !== task._id">
          <button class="btn btn-sm btn-outline-secondary" (click)="startEdit(task)">
            <i class="bi bi-pencil me-1"></i>Edit
          </button>
          <button class="btn btn-sm btn-outline-danger" (click)="deleteTask(task._id)">
            <i class="bi bi-trash me-1"></i>Delete
          </button>
        </ng-container>
        <ng-container *ngIf="editingTaskId === task._id">
          <button class="btn btn-sm btn-primary" (click)="saveEdit(task._id)">
            <i class="bi bi-check-lg me-1"></i>Save
          </button>
          <button class="btn btn-sm btn-outline-secondary" (click)="cancelEdit()">Cancel</button>
        </ng-container>
      </div>

    </div>
  </div>
</div>
