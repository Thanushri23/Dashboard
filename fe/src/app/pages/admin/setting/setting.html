<div class="p-1">
  <!-- Page header -->
  <div class="page-header">
    <div class="page-header-icon"><i class="bi bi-gear"></i></div>
    <div>
      <h2 class="page-title">Settings</h2>
      <p class="page-subtitle">Manage your account preferences</p>
    </div>
  </div>

  <!-- Logout card -->
  <div class="card" style="max-width:480px;">
    <div class="card-body p-4">
      <div class="d-flex align-items-center gap-3 mb-3">
        <div style="width:40px;height:40px;background:#fee2e2;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#dc2626;font-size:1.2rem;">
          <i class="bi bi-box-arrow-right"></i>
        </div>
        <div>
          <div class="fw-700" style="font-weight:700;color:#1e293b;font-size:0.95rem;">Account Actions</div>
          <div style="color:#64748b;font-size:0.82rem;">Manage your session</div>
        </div>
      </div>
      <p style="color:#64748b;font-size:0.88rem;margin-bottom:1.25rem;">
        Sign out of the manager dashboard securely. You will need your credentials to log back in.
      </p>
      <button class="btn btn-danger fw-semibold px-4" (click)="logout()">
        <i class="bi bi-box-arrow-right me-2"></i>Logout
      </button>
    </div>
  </div>
</div>
