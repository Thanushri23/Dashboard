<div class="card p-4 shadow-sm border-0 rounded-4">
  <h5 class="fw-bold mb-4 text-primary"><i class="bi bi-calendar-event me-2"></i>Employee Leave Requests</h5>
  
  <div *ngIf="leaves.length === 0" class="text-center text-muted py-5 bg-light rounded-3 border border-dashed">
    <p class="mt-2 mb-0 fs-5">No leave requests found.</p>
  </div>
  
  <div class="table-responsive border rounded-3" *ngIf="leaves.length > 0">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th class="ps-3 py-3">Employee</th>
          <th class="py-3">Duration</th>
          <th class="py-3">Reason</th>
          <th class="py-3">Status</th>
          <th class="pe-3 py-3 text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let leave of leaves">
          <td class="ps-3 fw-semibold text-dark">
            {{leave.userId?.name}} 
            <span class="d-block text-muted small fw-normal"><i class="bi bi-envelope me-1"></i>{{leave.userId?.email}}</span>
          </td>
          <td>
            <span class="d-block small text-muted">{{leave.startDate | date}} to</span>
            <span class="d-block small text-muted">{{leave.endDate | date}}</span>
          </td>
          <td>{{leave.reason}}</td>
          <td>
            <span class="badge rounded-pill px-3 py-2 shadow-sm border" 
                  [ngClass]="{
                    'bg-warning text-dark border-warning': leave.status === 'pending',
                    'bg-success border-success text-white': leave.status === 'approved',
                    'bg-danger border-danger text-white': leave.status === 'rejected'
                  }">
              {{leave.status | uppercase}}
            </span>
          </td>
          <td class="pe-3 text-end">
            <div class="btn-group shadow-sm" *ngIf="leave.status === 'pending'">
              <button class="btn btn-sm btn-success fw-semibold" (click)="updateLeave(leave._id, 'approved')">Approve</button>
              <button class="btn btn-sm btn-danger fw-semibold" (click)="updateLeave(leave._id, 'rejected')">Reject</button>
            </div>
            <span class="badge bg-light text-secondary border px-3 py-2 shadow-sm" *ngIf="leave.status !== 'pending'">
              <i class="bi bi-check2-circle me-1"></i>Processed
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
