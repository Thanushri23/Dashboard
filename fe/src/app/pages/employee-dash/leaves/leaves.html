<div class="card p-4 shadow-sm border-0 rounded-4">
  <h4 class="mb-4 fw-bold text-primary">Leave Management</h4>
  
  <div class="card bg-light border-0 mb-4 p-4 rounded-4">
    <h6 class="fw-bold mb-3 text-dark"><i class="bi bi-calendar-plus me-2"></i>Apply for Leave</h6>
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label small text-muted fw-bold mb-1">Start Date</label>
        <input type="date" class="form-control border-0 shadow-sm" [(ngModel)]="newLeave.startDate">
      </div>
      <div class="col-md-3">
        <label class="form-label small text-muted fw-bold mb-1">End Date</label>
        <input type="date" class="form-control border-0 shadow-sm" [(ngModel)]="newLeave.endDate">
      </div>
      <div class="col-md-4">
        <label class="form-label small text-muted fw-bold mb-1">Reason</label>
        <input type="text" class="form-control border-0 shadow-sm" placeholder="Reason for leave" [(ngModel)]="newLeave.reason">
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100 fw-semibold shadow-sm" (click)="applyLeave()">Submit</button>
      </div>
    </div>
  </div>

  <h5 class="fw-bold mb-3">My Leave History</h5>

  <div *ngIf="leaves.length === 0" class="text-center text-muted py-5 bg-light rounded-3 border border-dashed">
    <p class="mt-2 mb-0 fs-5">No leave requests found.</p>
  </div>

  <div class="table-responsive" *ngIf="leaves.length > 0">
    <table class="table table-hover align-middle border">
      <thead class="table-light">
        <tr>
          <th class="ps-3 py-3">Start Date</th>
          <th class="py-3">End Date</th>
          <th class="py-3">Reason</th>
          <th class="pe-3 py-3 text-end">Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let leave of leaves">
          <td class="ps-3">{{leave.startDate | date}}</td>
          <td>{{leave.endDate | date}}</td>
          <td>{{leave.reason}}</td>
          <td class="pe-3 text-end">
            <span class="badge rounded-pill px-3 py-2 shadow-sm" 
                  [ngClass]="{
                    'bg-warning text-dark': leave.status === 'pending',
                    'bg-success': leave.status === 'approved',
                    'bg-danger': leave.status === 'rejected'
                  }">
              {{leave.status | uppercase}}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
