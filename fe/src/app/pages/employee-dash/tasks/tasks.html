<div class="p-1">
  <!-- Page header -->
  <div class="page-header">
    <div class="page-header-icon"><i class="bi bi-list-task"></i></div>
    <div>
      <h2 class="page-title">My Tasks</h2>
      <p class="page-subtitle">View and manage your assigned tasks</p>
    </div>
  </div>

  <!-- Add task form -->
  <div class="form-panel">
    <div class="form-panel-title"><i class="bi bi-plus-circle"></i> Add New Task</div>
    <div class="d-flex flex-wrap gap-3 align-items-end">
      <div class="flex-grow-1" style="min-width:200px;">
        <label class="info-label mb-1">Task Title</label>
        <input type="text" class="form-control" placeholder="Enter task title" [(ngModel)]="newTask.title">
      </div>
      <div class="flex-grow-1" style="min-width:240px;">
        <label class="info-label mb-1">Description</label>
        <input type="text" class="form-control" placeholder="Brief description" [(ngModel)]="newTask.description">
      </div>
      <button class="btn btn-primary fw-semibold px-4" (click)="addTask()" [disabled]="isSubmitting">
        <i class="bi bi-plus-lg me-1" *ngIf="!isSubmitting"></i>
        <span class="spinner-border spinner-border-sm me-1" *ngIf="isSubmitting" role="status" aria-hidden="true"></span>
        {{ isSubmitting ? 'Adding...' : 'Add Task' }}
      </button>
    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="tasks.length === 0" class="empty-state">
    <i class="bi bi-clipboard-x"></i>
    <p class="mb-0 fw-semibold">No tasks yet</p>
    <p class="small mt-1">Create a task using the form above</p>
  </div>

  <!-- Tasks list -->
  <div class="d-flex flex-column gap-3">
    <div *ngFor="let task of tasks" class="item-card">

      <!-- View mode -->
      <div class="flex-grow-1 mb-2 mb-sm-0" *ngIf="editingTaskId !== task._id">
        <p class="item-title">{{task.title}}</p>
        <p class="item-desc">{{task.description}}</p>
      </div>

      <!-- Edit mode -->
      <div class="flex-grow-1 d-flex flex-wrap gap-2 me-3 mb-2 mb-sm-0" *ngIf="editingTaskId === task._id">
        <input type="text" class="form-control form-control-sm" style="min-width:160px; flex:1;" [(ngModel)]="editTaskData.title" placeholder="Task title">
        <input type="text" class="form-control form-control-sm" style="min-width:200px; flex:2;" [(ngModel)]="editTaskData.description" placeholder="Description">
      </div>

      <div class="d-flex gap-2 flex-shrink-0">
        <ng-container *ngIf="editingTaskId !== task._id">
          <button class="btn btn-sm btn-outline-secondary" (click)="startEdit(task)">
            <i class="bi bi-pencil me-1"></i>Edit
          </button>
          <button class="btn btn-sm btn-outline-danger" (click)="deleteTask(task._id)">
            <i class="bi bi-trash me-1"></i>Delete
          </button>
        </ng-container>
        <ng-container *ngIf="editingTaskId === task._id">
          <button class="btn btn-sm btn-primary" (click)="saveEdit(task._id)">
            <i class="bi bi-check-lg me-1"></i>Save
          </button>
          <button class="btn btn-sm btn-outline-secondary" (click)="cancelEdit()">Cancel</button>
        </ng-container>
      </div>

    </div>
  </div>
</div>
