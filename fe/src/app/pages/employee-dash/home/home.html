<div class="d-flex flex-column gap-4">
  <div class="card p-4 shadow-sm border-0 rounded-4">
    <h4 class="mb-4 fw-bold text-primary"><i class="bi bi-list-task me-2"></i>Recent Tasks</h4>
    
    <div *ngIf="tasks.length === 0" class="text-center text-muted py-4 bg-light rounded-3 border border-dashed">
      <p class="mb-0">No tasks assigned.</p>
    </div>

    <div class="d-flex flex-column gap-3" *ngIf="tasks.length > 0">
      <div *ngFor="let task of tasks.slice(0, 5)" class="border p-3 rounded-3 shadow-sm bg-white" style="border-left: 4px solid #0d6efd !important;">
        <div class="d-flex align-items-center justify-content-between mb-1">
          <h6 class="mb-0 fw-bold text-dark">{{task.title}}</h6>
          <span class="badge" 
                [ngClass]="{
                  'bg-warning text-dark': task.status === 'pending',
                  'bg-success': task.status === 'completed'
                }">
            {{task.status || 'pending' | uppercase}}
          </span>
        </div>
        <p class="mb-0 text-muted small">{{task.description}}</p>
      </div>
    </div>
  </div>

  <div class="card p-4 shadow-sm border-0 rounded-4">
    <h4 class="mb-4 fw-bold text-primary"><i class="bi bi-calendar-event me-2"></i>Recent Leaves</h4>

    <div *ngIf="leaves.length === 0" class="text-center text-muted py-4 bg-light rounded-3 border border-dashed">
      <p class="mb-0">No leave requests found.</p>
    </div>

    <div class="table-responsive" *ngIf="leaves.length > 0">
      <table class="table table-hover align-middle border rounded-3 mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3 py-2">Date</th>
            <th class="py-2">Reason</th>
            <th class="pe-3 py-2 text-end">Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let leave of leaves.slice(0, 5)">
            <td class="ps-3 small">{{leave.startDate | date}} to {{leave.endDate | date}}</td>
            <td class="small">{{leave.reason}}</td>
            <td class="pe-3 text-end">
              <span class="badge rounded-pill px-2" 
                    [ngClass]="{
                      'bg-warning text-dark': leave.status === 'pending',
                      'bg-success': leave.status === 'approved',
                      'bg-danger': leave.status === 'rejected'
                    }">
                {{leave.status | uppercase}}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
