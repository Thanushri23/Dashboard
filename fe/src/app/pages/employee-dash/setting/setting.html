<div class="card p-4 shadow-sm border-0 rounded-4">
  <h4 class="mb-4 fw-bold text-primary"><i class="bi bi-gear me-2"></i>Settings</h4>

  <div class="card bg-light border-0 p-4 rounded-4 mb-4">
    <h6 class="fw-bold text-dark mb-3">Account Actions</h6>
    <p class="text-muted small mb-3">Sign out of your account on this device. You will need your credentials to log back in.</p>
    <button class="btn btn-danger fw-semibold shadow-sm w-auto px-4" (click)="logout()">
      <i class="bi bi-box-arrow-right me-2"></i>Logout
    </button>
  </div>
</div>
