<div class="login-wrapper">
  <!-- Left brand panel -->
  <div class="login-brand-panel">
    <div class="brand-content">
      <div class="brand-icon">
        <i class="bi bi-people-fill"></i>
      </div>
      <h1 class="brand-title">Join the Portal</h1>
      <p class="brand-subtitle">Create your account and get started in minutes.</p>
      <div class="brand-features">
        <div class="feature-item"><i class="bi bi-shield-check-fill me-2"></i>Secure Access</div>
        <div class="feature-item"><i class="bi bi-person-badge-fill me-2"></i>Role-Based Dashboard</div>
        <div class="feature-item"><i class="bi bi-bar-chart-fill me-2"></i>Real-Time Updates</div>
      </div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="login-form-panel">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">
          <i class="bi bi-person-plus-fill"></i>
        </div>
        <h2 class="login-title">Create Account</h2>
        <p class="login-desc">Fill in your details to get started</p>
      </div>

      <div class="form-group-custom">
        <label class="form-label-custom">Full Name</label>
        <div class="input-wrapper">
          <i class="bi bi-person input-icon"></i>
          <input type="text" [(ngModel)]="data.name" placeholder="John Doe" class="form-control-custom">
        </div>
      </div>

      <div class="form-group-custom">
        <label class="form-label-custom">Phone Number</label>
        <div class="input-wrapper">
          <i class="bi bi-telephone input-icon"></i>
          <input type="text" [(ngModel)]="data.phone" placeholder="+1 234 567 8900" class="form-control-custom">
        </div>
      </div>

      <div class="form-group-custom">
        <label class="form-label-custom">Email Address</label>
        <div class="input-wrapper">
          <i class="bi bi-envelope input-icon"></i>
          <input type="email" [(ngModel)]="data.email" placeholder="you@company.com" class="form-control-custom">
        </div>
      </div>

      <div class="form-group-custom">
        <label class="form-label-custom">Password</label>
        <div class="input-wrapper">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" [(ngModel)]="data.password" placeholder="Create a strong password" class="form-control-custom">
        </div>
      </div>

      <div class="form-group-custom">
        <label class="form-label-custom">Role</label>
        <div class="input-wrapper">
          <i class="bi bi-briefcase input-icon"></i>
          <select [(ngModel)]="data.role" class="form-control-custom form-select-custom">
            <option value="employee">Employee</option>
            <option value="manager">Manager</option>
          </select>
        </div>
      </div>

      <button class="btn-login" (click)="register()">
        <i class="bi bi-person-check me-2"></i>Create Account
      </button>

      <p class="login-footer">
        Already have an account?
        <a routerLink="/login" class="login-link">Sign In</a>
      </p>
    </div>
  </div>
</div>
